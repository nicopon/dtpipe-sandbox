services:
  postgres:
    image: postgres:18-alpine
    container_name: dtpipe-integ-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: integration
    ports:
      - "5440:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  mssql:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: dtpipe-integ-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Password123!"
    ports:
      - "1434:1433"
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 10s
      start_period: 10s

  oracle:
    image: gvenzl/oracle-free:slim
    container_name: dtpipe-integ-oracle
    environment:
      ORACLE_PASSWORD: "password"
      APP_USER: "testuser"
      APP_USER_PASSWORD: "password"
    ports:
      - "1522:1521"
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 10s
      start_period: 10s
  mssql-tools:
    image: mcr.microsoft.com/mssql-tools
    container_name: dtpipe-integ-mssql-tools
    entrypoint: /bin/sh -c "while true; do sleep 3600; done"
    network_mode: service:mssql
